<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Check</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f9ff;
  text-align: center;
}

.container {
  margin-top: 120px;
}

h1 {
  color: #0b5ed7;
  font-size: 34px;
}

#text {
  font-size: 24px;
  color: #333;
  margin-top: 25px;
  min-height: 50px;
}

.page2 {
  display: none;
  margin-top: 150px;
  font-size: 40px;
  color: #0b5ed7;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container" id="page1">
  <h1>System Check</h1>
  <div id="text">جاري البدء...</div>
</div>

<div class="page2" id="page2">
  جمعه مباركه🫂🤍
</div>

<script>
let messages = [
"Checking system...",
"Connecting securely...",
"Loading data...",
"Verifying access...",
"Finalizing...",
"Done 😌"
];

let i = 0;

function run() {
  if (i < messages.length) {
    document.getElementById("text").innerText = messages[i];
    i++;
    setTimeout(run, 1200);
  } else {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
  }
}

run();
</script>

</body>
</html>
