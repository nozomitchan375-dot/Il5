<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Access</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #0b1220;
  color: #d6e2ff;
  text-align: center;
  overflow: hidden;
}

.container {
  margin-top: 120px;
}

h1 {
  color: #4da3ff;
  font-size: 34px;
  letter-spacing: 2px;
}

#text {
  font-size: 22px;
  margin-top: 25px;
  min-height: 60px;
  color: #cfe3ff;
}

.warning {
  color: #ff4d4d;
  font-size: 14px;
  margin-top: 10px;
  opacity: 0.8;
}

.page2 {
  display: none;
  margin-top: 180px;
  font-size: 54px;
  font-family: 'Amiri', serif;
  color: #4da3ff;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="container" id="page1">
  <h1>SECURE SYSTEM</h1>
  <div class="warning">⚠ Unauthorized access detected...</div>
  <div id="text">Initializing...</div>
</div>

<div class="page2" id="page2">
  جمعه مباركه🫂🤍<br>
  <div style="font-size:20px; margin-top:10px;">😌 just a prank</div>
</div>

<script>
let messages = [
"Connecting to device...",
"Bypassing security...",
"Accessing system files...",
"Scanning personal data...",
"Warning: unusual activity detected",
"Locking session...",
"......",
"Access complete"
];

let i = 0;

function run() {
  if (i < messages.length) {
    document.getElementById("text").innerText = messages[i];
    i++;
    setTimeout(run, 1400);
  } else {
    document.getElementById("page1").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("page1").style.display = "none";
      document.getElementById("page2").style.display = "block";
    }, 800);
  }
}

run();
</script>

</body>
</html>
